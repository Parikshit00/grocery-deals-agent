# Local data store for grocery-deals-agent: Postgres.
# The app and frontend run separately; vLLM runs on the host.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-angebot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-angebot}
      POSTGRES_DB: ${POSTGRES_DB:-angebot}
    ports:
      # localhost-only: the app runs on the same host; DB must not be network-exposed.
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-angebot}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
